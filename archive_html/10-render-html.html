<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Sandbox: Render HTML</title>
    <style>
      body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
      h3 { margin-top: 0; color: #61dafb; border-bottom: 1px solid #444; padding-bottom: 5px; }
      .section { margin-bottom: 30px; padding: 15px; border: 1px solid #444; border-radius: 8px; background: #2a2a2a; }
      .card { border: 1px solid #555; padding: 10px; margin: 10px 0; border-radius: 6px; background: #333; }
      button { padding: 8px 12px; cursor: pointer; }
    </style>
  </head>
  <body>

    <div class="section">
      <h3>1. Рендер простого списку</h3>
      <p>Виводимо масив міст як елементи &lt;li&gt;.</p>
      <button class="btn-render-list">Показати міста</button>
      <ul class="city-list"></ul>
    </div>

    <div class="section">
      <h3>2. Рендер карток (Об'єкти)</h3>
      <p>Виводимо масив об'єктів (товарів) як красиві картки.</p>
      <button class="btn-render-cards">Показати товари</button>
      <div class="product-container"></div>
    </div>

    <div class="section">
      <h3>3. Комбінація (Фільтр + Рендер)</h3>
      <p>Виводимо картки ТІЛЬКИ для активних користувачів.</p>
      <button class="btn-render-active">Показати активних</button>
      <div class="active-users-container"></div>
    </div>

    <script src="../archive_js/10-render-html.js"></script>
  </body>
</html>
