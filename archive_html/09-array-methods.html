<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Sandbox: Array Methods</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1e1e1e; color: #fff; }
    div { margin-bottom: 20px; padding: 15px; border: 1px solid #444; border-radius: 8px; background: #2a2a2a; }
    h3 { margin-top: 0; color: #61dafb; }
    ul { list-style-type: square; color: #a5d6ff; }
  </style>
</head>
<body>

  <div>
    <h3>1. Метод forEach (Простий перебір)</h3>
    <p>Виводимо імена в консоль (відкрий F12).</p>
    <button class="btn-foreach">Запустити forEach</button>
  </div>

  <div>
    <h3>2. Метод map (Трансформація)</h3>
    <p>Множимо ціни на 2 і виводимо на екран.</p>
    <button class="btn-map">Зробити х2 (map)</button>
    <ul class="prices-list"></ul>
  </div>

  <div>
    <h3>3. Метод filter (Фільтрація)</h3>
    <p>Шукаємо тільки VIP-клієнтів.</p>
    <button class="btn-filter">Показати VIP (filter)</button>
    <ul class="vip-list"></ul>
  </div>

  <script src="../archive_js/09-array-methods.js"></script>
</body>
</html>
