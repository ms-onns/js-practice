<!DOCTYPE html>
<html lang="uk">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practice</title>
  </head>

  <body>

    <div>
      <hr>
      <input type="text" class="login-input" placeholder="Введіть ваше ім'я">
      <button class="login-btn">Увійти</button>
      <p class="welcome-text">Очікування користувача...</p>
    </div>

    <div>
      <hr>
      <input type="password" class="secret-input" placeholder="Введіть таємний код">
      <button class="unlock-btn">Розблокувати</button>
      <p class="security-status">Система заблокована</p>
    </div>

    <div>
      <hr>
      <p class="question-text">Антибот: Скільки буде 5 + 5?</p>
      <input type="text" class="captcha-input" placeholder="Ваша відповідь">
      <button class="verify-btn">Перевірити</button>
      <p class="bot-status">Очікування відповіді...</p>
    </div>

    <script src="../archive_js/07-validation.js"></script>
  </body>

</html>
