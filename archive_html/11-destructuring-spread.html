<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Sandbox: Destructuring & Spread</title>
    <style>
      body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
      .section { margin-bottom: 30px; padding: 15px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; }
      h3 { color: #58a6ff; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 5px;}
      button { background: #238636; color: white; border: 1px solid #2ea043; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: monospace; }
      button:hover { background: #2ea043; }
    </style>
  </head>
  
  <body>

    <div class="section">
      <h3>1. Деструктуризація об'єкта</h3>
      <p>Дістаємо дані хакерським шляхом (дивись консоль).</p>
      <button class="btn-obj">Розібрати об'єкт</button>
    </div>

    <div class="section">
      <h3>2. Деструктуризація масиву</h3>
      <p>Забираємо перші два елементи (дивись консоль).</p>
      <button class="btn-arr">Розібрати масив</button>
    </div>

    <div class="section">
      <h3>3. Spread-оператор (...)</h3>
      <p>Об'єднуємо дві бази даних в одну без мутацій.</p>
      <button class="btn-spread">Об'єднати бази</button>
    </div>

    <script src="../archive_js/11-destructuring-spread.js"></script>
  </body>
</html>
